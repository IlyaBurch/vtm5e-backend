# Добавь эти location блоки в существующие server блоки nginx на VPS.
# НЕ заменяй весь конфиг — только добавляй location /api/

# --- В server блок для STAGING (тот что слушает staging.yourdomain.com, порт фронта 8080) ---

    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }


# --- В server блок для PROD (тот что слушает yourdomain.com, порт фронта 8081) ---

    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
