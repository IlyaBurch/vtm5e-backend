services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend-staging:
    image: ghcr.io/GITHUB_USERNAME/vtm5e-backend:staging
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - web

  frontend-staging:
    image: ghcr.io/GITHUB_USERNAME/vtm5e-frontend:staging
    restart: unless-stopped
    networks:
      - web

volumes:
  postgres_staging_data:

networks:
  internal:
    driver: bridge
  web:
    external: true
