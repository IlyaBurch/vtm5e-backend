services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vtm
      POSTGRES_PASSWORD: vtm
      POSTGRES_DB: vtm5e_staging
    ports:
      - "5432:5432"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vtm -d vtm5e_staging"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_staging_data:
